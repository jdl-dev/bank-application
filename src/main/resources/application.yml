spring:
  application:
    name=Bank-app
  datasource:
    url: jdbc:postgresql://localhost:5432/bankapp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081
logging:
  level:
    org.hibernate.SQL: debug